# MongoDB connection string — set via environment variable or .env
spring.application.name=intelligent-job-matching

mongodb.uri=${MONGODB_URI}
mongodb.database=${MONGODB_DATABASE:jobmatching}

# Atlas VoyageAI API key for embeddings
voyage.api.key=${VOYAGE_API_KEY}
voyage.model=${VOYAGE_MODEL:voyage-4-large}
voyage.api.url=${VOYAGE_API_URL:https://ai.mongodb.com/v1/embeddings}

# LLM API key and endpoint for structured field extraction
llm.api.key=${LLM_API_KEY}
llm.api.url=${LLM_API_URL:https://api.openai.com/v1/chat/completions}
llm.model=${LLM_MODEL:gpt-4o-mini}

# Multipart file upload limit (PDFs can be a few MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Server port
server.port=8080
