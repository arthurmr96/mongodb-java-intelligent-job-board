# Intelligent Job Matching Platform — local development stack
#
# Usage:
#   1. Copy .env.example to .env and fill in your credentials.
#   2. docker-compose up --build
#   3. Open http://localhost in your browser.
#
# Services:
#   backend   — Spring Boot API on port 8080 (internal)
#   frontend  — React + nginx on port 80 (public)
#
# MongoDB Atlas is not run locally — the backend connects to your Atlas cluster
# via the MONGODB_URI in your .env file.

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URI:      ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-jobmatching}
      VOYAGE_API_KEY:   ${VOYAGE_API_KEY}
      VOYAGE_MODEL:     ${VOYAGE_MODEL:-voyage-4-large}
      VOYAGE_API_URL:   ${VOYAGE_API_URL:-https://ai.mongodb.com/v1/embeddings}
      LLM_API_KEY:      ${LLM_API_KEY}
      LLM_API_URL:      ${LLM_API_URL:-https://api.openai.com/v1/chat/completions}
      LLM_MODEL:        ${LLM_MODEL:-gpt-4o-mini}
    # Allows the container to reach services on the host (e.g. a local Ollama instance).
    # On Mac/Windows this is automatic; on Linux this entry is needed.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
